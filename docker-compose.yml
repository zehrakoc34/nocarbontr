version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: score3-cbam-db
    environment:
      POSTGRES_USER: ${DB_USER:-score3cbam}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-score3cbam123}
      POSTGRES_DB: ${DB_NAME:-score3cbam}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-score3cbam}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - score3-network

  # Score3 CBAM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: score3-cbam-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-score3cbam}:${DB_PASSWORD:-score3cbam123}@postgres:5432/${DB_NAME:-score3cbam}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
      OWNER_NAME: ${OWNER_NAME}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - score3-network
    restart: unless-stopped

  # Optional: Redis for caching (future enhancement)
  # redis:
  #   image: redis:7-alpine
  #   container_name: score3-cbam-cache
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - score3-network

volumes:
  postgres_data:
    driver: local
  # redis_data:
  #   driver: local

networks:
  score3-network:
    driver: bridge
