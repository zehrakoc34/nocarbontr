[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm && pnpm install && pnpm run build"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/api/trpc/auth.me"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "nocarbontr"
